name: Discord PR Notification

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send PR notification to Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{
            "content": "[FRONT] PR이 생성되었습니다. \n\n**Repository:** ${{ github.repository }}\n**Title:** ${{ github.event.pull_request.title }}\n**Author:** ${{ github.event.pull_request.user.login }}\n**Branch:** ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}\n**URL:** ${{ github.event.pull_request.html_url }}"
          }' \
          "${{ secrets.DISCORD_WEBHOOK_URL }}"
